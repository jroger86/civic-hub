<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Civic Hub - Sign up</title>

    <!-- Base theme (dark gradient, burgundy + gold, hints of white) -->
    <link rel="stylesheet" href="theme.css" />

    <!-- Lightweight forms styling -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"
    />

    <style>
      :root {
        --pico-primary: var(--burgundy);
        --pico-primary-hover: #7a0e15;
        --pico-primary-focus: #7a0e15;
      }

      main.container {
        max-width: 760px;
        margin: 0 auto;
        padding: 22px 18px 44px;
      }

      form {
        margin-top: 14px;
      }

      .helper {
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Civic Hub</span>
      </a>

      <nav>
        <a href="index.html" class="badge">Home</a>
        <a href="issues.html" class="badge">Issues</a>
        <a href="live-debate.html" class="badge">Live Debate</a>
        <a href="community.html" class="badge">Community</a>
        <a href="petitions.html" class="badge">Petitions</a>
        <a href="emergency-guidance.html" class="badge">Emergency</a>
        <a href="about.html" class="badge">About</a>
        <a href="signup.html" class="cta">Sign up</a>
      </nav>
    </header>

    <main class="container">
      <article class="card">
        <h1>Join Civic Hub</h1>
        <p class="helper">
          Create a civic profile so you can comment on datasets, submit signals,
          and propose what needs more investment.
        </p>

        <form id="signupForm">
          <div class="grid">
            <label>
              Name
              <input type="text" id="displayName" required />
            </label>

            <label>
              Handle
              <input type="text" id="handle" required />
            </label>

            <label>
              Email (optional)
              <input type="email" id="contactEmail" />
            </label>

            <label>
              Phone (optional)
              <input type="tel" id="contactPhone" />
            </label>
          </div>

          <label>
            Bio (optional)
            <textarea id="bio" rows="4"></textarea>
          </label>

          <label>
            <input type="checkbox" id="isPublic" checked />
            Make profile public
          </label>

          <button type="submit" class="cta">Create profile</button>
        </form>

        <p class="helper">
          Note: prototype only. No data stored yet. Camera access remains
          in-browser.
        </p>
      </article>
    </main>

    <script>
      document.getElementById("signupForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Demo: profile would be created here.");
      });
    </script>
  </body>
</html>
