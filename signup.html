<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Civic Hub - Sign up</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"
    />

    <style>
      :root {
        --niners-red: #aa0000;
        --niners-gold: #b3995d;

        --pico-primary: var(--niners-red);
        --pico-primary-hover: #8d0000;
        --pico-primary-focus: #8d0000;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #0a0f26, #070d1f);
        color: #fff;
      }

      a {
        color: var(--niners-gold);
      }

      main.container {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      textarea {
        width: 100%;
      }

      button[type="submit"] {
        background: linear-gradient(90deg, var(--niners-red), var(--niners-gold));
        border: none;
        color: #fff;
        font-weight: 700;
        border-radius: 999px;
        padding: 10px 14px;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h1>Sign up</h1>
      <p>
        Create your Civic Hub profile so you can post, petition, and show up in the
        community directory.
      </p>

      <form id="signupForm">
        <label>
          Name
          <input type="text" name="displayName" required />
        </label>

        <label>
          Handle
          <input type="text" name="handle" required />
        </label>

        <label>
          Email (optional)
          <input type="email" name="contactEmail" />
        </label>

        <label>
          Phone (optional)
          <input type="tel" name="contactPhone" />
        </label>

        <label>
          Bio
          <textarea name="bio" rows="3"></textarea>
        </label>

        <label>
          <input type="checkbox" name="isPublic" checked />
          Make my profile public
        </label>

        <button type="submit">Create profile</button>
      </form>

      <p id="result"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
