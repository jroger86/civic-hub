<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Civic Hub — Petitions</title>
  <style>
    body{margin:0;font-family:system-ui;background:#050815;color:rgba(255,255,255,.92)}
    a{color:#5addee;text-decoration:none}
    header{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:14px;border-bottom:1px solid rgba(90,221,255,.25)}
    nav{display:flex;gap:8px;flex-wrap:wrap}
    nav a{padding:8px 10px;border:1px solid rgba(255,255,255,.10);border-radius:999px;color:rgba(255,255,255,.68)}
    nav a:hover{border-color:#5addee;color:#5addee}
    .wrap{max-width:1100px;margin:0 auto;padding:14px}
    .card{border:1px solid rgba(90,221,255,.25);background:rgba(255,255,255,.04);border-radius:16px;padding:14px;margin-top:12px}
    input,textarea,select{width:100%;margin-top:10px;border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:rgba(255,255,255,.92)}
    textarea{min-height:90px}
    button{margin-top:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(90,221,255,.10);color:#5addee;cursor:pointer}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.2);font-size:12px;color:rgba(255,255,255,.68)}
    .hr{height:1px;background:rgba(255,255,255,.1);margin:12px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <strong>Civic Hub</strong>
      <nav>
        <a href="index.html">Home</a>
        <a href="issues.html">Issues</a>
        <a href="live-debate.html">Live Debate</a>
        <a href="community.html">Community</a>
        <a href="petitions.html">Petitions</a>
        <a href="emergency-guidance.html">Emergency Guidance</a>
        <a href="cin-model.html">CIN Model</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h2>Identity</h2>
        <div id="profileStatus">Loading...</div>
        <form id="profileForm">
          <input id="displayName" name="displayName" placeholder="Display name" autocomplete="name" required>
          <button type="submit">Save identity</button>
        </form>
        <button id="clearProfile" type="button">Clear identity</button>
      </section>

      <section class="card">
        <h2>Create a petition</h2>
        <p style="color: rgba(255,255,255,.68)">Keep it short and specific. What’s the problem, and what do you want done?</p>
        <form id="petitionForm">
          <input name="title" placeholder="Petition title" required>
          <textarea name="problem" placeholder="Describe the problem"></textarea>
          <textarea name="request" placeholder="Describe the requested change"></textarea>
          <input name="issueRef" placeholder="Related issue ID or link (optional)">
          <input name="budgetRef" placeholder="Related budget item (optional)">
          <button type="submit">Publish petition</button>
        </form>
      </section>

      <section class="card">
        <h2>Petitions</h2>
        <div id="petitionsList"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    const profileStatus = document.getElementById('profileStatus');
    const displayName = document.getElementById('displayName');

    function renderProfile() {
      const p = civicHub.profile.getProfile();
      profileStatus.textContent = p ? `Signed in as ${p.displayName}` : 'Not signed in';
      displayName.value = p?.displayName || '';
    }

    document.getElementById('profileForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = displayName.value.trim();
      if (!name) return;
      civicHub.profile.saveProfile({ displayName: name });
      renderProfile();
      renderPetitions();
    });

    document.getElementById('clearProfile').addEventListener('click', () => {
      civicHub.profile.clearProfile();
      renderProfile();
      renderPetitions();
    });

    function renderPetitions() {
      const list = document.getElementById('petitionsList');
      const items = civicHub.petitions.list();
      list.innerHTML = '';

      if (!items.length) {
        list.innerHTML = '<p style="color: rgba(255,255,255,.68)">No petitions yet.</p>';
        return;
      }

      const profile = civicHub.profile.getProfile();

      for (const item of items) {
        const sigs = item.signatures || [];
        const signed = profile ? sigs.some(s => s.userId === profile.id) : false;
        const sigNames = sigs.slice(0, 3).map(s => s.name || 'Anon').join(', ');
        const more = sigs.length > 3 ? ` +${sigs.length - 3}` : '';

        const actions = profile
          ? (signed
              ? '<span class="badge">Signed</span>'
              : `<button data-action="sign" data-id="${item.id}">Sign petition</button>`)
          : '<p style="color: rgba(255,255,255,.68)">Save an identity to sign petitions.</p>';

        list.innerHTML += `
          <div class="card">
            <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
              <strong>${item.title}</strong>
              <span class="badge">${sigs.length} signatures</span>
            </div>
            <div style="color: rgba(255,255,255,.68);margin-top:6px">
              ${item.problem || ''}
            </div>
            <div class="hr"></div>
            <div style="color: rgba(255,255,255,.68)">
              Requested change: ${item.request || ''}
            </div>
            <div style="font-size:12px;color: rgba(255,255,255,.68);margin-top:10px">
              Related: ${item.issueRef || '—'} • Budget: ${item.budgetRef || '—'}
            </div>
            <div style="font-size:12px;color: rgba(255,255,255,.68);margin-top:4px">
              Created by ${item.createdBy || 'Anonymous'} • ${civicHub.fmtTime(item.createdAt)}
            </div>
            <div style="font-size:12px;color: rgba(255,255,255,.68);margin-top:6px">
              Recent signatures: ${sigNames || '—'}${more}
            </div>
            <div style="margin-top:10px">${actions}</div>
          </div>`;
      }
    }

    document.getElementById('petitionForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const f = e.target;
      const profile = civicHub.profile.getProfile();

      civicHub.petitions.add({
        title: f.title.value.trim(),
        problem: f.problem.value.trim(),
        request: f.request.value.trim(),
        issueRef: f.issueRef.value.trim(),
        budgetRef: f.budgetRef.value.trim(),
        createdBy: profile?.displayName || 'Anonymous',
      });

      f.reset();
      renderPetitions();
    });

    document.getElementById('petitionsList').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;

      if (btn.dataset.action === 'sign') {
        const profile = civicHub.profile.getProfile();
        if (!profile) {
          alert('Save an identity first.');
          return;
        }

        const ok = civicHub.petitions.sign(btn.dataset.id, {
          userId: profile.id,
          name: profile.displayName,
        });

        if (!ok) {
          alert('You have already signed this petition.');
        }

        renderPetitions();
      }
    });

    renderProfile();
    renderPetitions();
  </script>
</body>
</html>
