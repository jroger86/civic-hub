<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Civic Hub — Issues (with Profiles)</title>
  <style>
    :root {
      --bg:#050a15;
      --panel:rgba(255,255,255,.03);
      --panel2:rgba(255,255,255,.05);
      --accent:#5addee;
      --text:rgba(255,255,255,.88);
      --muted:rgba(255,255,255,.70);
      --warn:#ffcc66;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
    a { color:var(--accent); text-decoration:none; }

    header { position:sticky; top:0; z-index:6; backdrop-filter:blur(10px); background:rgba(5,10,21,.92); border-bottom:1px solid rgba(90,221,238,.25); }
    .top { max-width:1100px; margin:0 auto; padding:12px 16px; display:flex; align-items:center; flex-wrap:wrap; gap:12px; }
    .brand { font-weight:900; letter-spacing:.02em; color:var(--accent); }
    nav { display:flex; gap:10px; flex-wrap:wrap; }
    nav a { padding:8px 10px; border:1px solid rgba(255,255,255,.10); border-radius:999px; color:rgba(255,255,255,.68); font-weight:700; }
    nav a:hover { border-color:var(--accent); color:var(--accent); }

    .shell { max-width:1100px; margin:0 auto; padding:16px; }
    .hero h1 { margin:0; font-size:30px; }
    .hero p { margin:8px 0 0 0; color:var(--muted); }

    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-top:16px; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } }

    .card { border:1px solid rgba(90,221,238,.20); background:var(--panel); border-radius:16px; padding:14px; }
    .card h2 { margin:0 0 10px 0; color:var(--accent); font-size:16px; }
    .muted { color:var(--muted); font-size:13px; }

    .form { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
    input, textarea, select { width:100%; border-radius:12px; padding:10px; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.03); color:var(--text); }
    textarea { min-height:100px; resize:vertical; }

    .row { display:flex; gap:10px; }
    .row > * { flex:1; }

    button { border:none; border-radius:999px; padding:10px 14px; font-weight:900; cursor:pointer; }
    .primary { background:var(--accent); color:#050a15; }
    .secondary { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.14); color:var(--text); }

    .list { margin-top:12px; display:grid; gap:12px; }
    .issue { border:1px solid rgba(255,255,255,.12); border-radius:16px; background:rgba(255,255,255,.02); padding:12px; }
    .issue-top { display:flex; justify-content:space-between; gap:10px; }
    .issue-title { margin:0; font-weight:900; }
    .issue-meta { color:var(--muted); font-size:12px; margin-top:4px; }
  </style>

  <!-- You fill this in when you deploy a real backend -->
  <script>
    window._civicHubSupabase = window._civicHubSupabase || {
      url: 'YOUR_SUPABASE_URL',
      anonKey: 'YOUR_SUPABASE_ANON_KEY'
    };
  </script>
  <script src="app.js"></script>
</head>

<body>
  <header>
    <div class="top">
      <div class="brand">Civic Hub</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="issues.html">Issues</a>
        <a href="live-debate.html">Live Debate</a>
        <a href="community.html">Community</a>
        <a href="petitions.html">Petitions</a>
        <a href="emergency-guidance.html">Emergency Guidance</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <h1>Issues</h1>
      <p>File issues and add notes. Your profile is used for attribution and feeds.</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Your identity</h2>
        <div id="profileStatus" class="muted">Loading…</div>

        <form id="identityForm" class="form">
          <input id="displayName" placeholder="Display name" autocomplete="name" required />
          <button type="submit" class="primary">Save</button>
          <a class="secondary" style="display:inline-block; padding:10px 14px; margin-top:6px" href="community.html">Open full profile</a>
        </form>
      </div>

      <div class="card">
        <h2>Report an issue</h2>
        <p class="muted">(Demo) issues are saved locally.</p>

        <form id="issueForm" class="form">
          <div class="row">
            <select id="category">
              <option value="">Category</option>
              <option value="Safety">Safety</option>
              <option value="Housing">Housing</option>
              <option value="Transit">Transit</option>
              <option value="Education">Education</option>
              <option value="Policy">Policy</option>
              <option value="Other">Other</option>
            </select>
            <input id="title" placeholder="Issue title" required />
          </div>
          <input id="location" placeholder="Location (optional)" />
          <textarea id="details" placeholder="Details"></textarea>
          <button type="submit" class="primary">Submit issue</button>
        </form>

        <div class="list" id="issueList"></div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      const civic = window.civicHub || {};
      const profileApi = civic.profile;
      const issuesApi = civic.issues;

      const profileStatus = document.getElementById('profileStatus');
      const identityForm = document.getElementById('identityForm');
      const displayName = document.getElementById('displayName');

      const issueList = document.getElementById('issueList');
      const issueForm = document.getElementById('issueForm');

      function safe(fn){ try { return fn(); } catch(e){ console.error(e); return undefined; } }

      function renderIdentity(){
        const me = safe(() => profileApi && profileApi.getCurrent());
        if (me && me.displayName){
          profileStatus.textContent = 'Signed in as: ' + me.displayName;
          displayName.value = me.displayName;
          return me;
        } else {
          profileStatus.innerHTML = 'No identity set. Save a display name here or open the full profile page.';
          return null;
        }
      }

      function renderIssues(){
        const list = safe(() => issuesApi && issuesApi.list()) || [];
        issueList.innerHTML = '';
        if (!list.length){
          const div = document.createElement('div');
          div.className = 'muted';
          div.textContent = 'No issues yet.';
          issueList.appendChild(div);
          return;
        }
        for (const i of list){
          const div = document.createElement('div');
          div.className = 'issue';
          const metaParts = [];
          if (i.category) metaParts.push(i.category);
          if (i.location) metaParts.push(i.location);
          if (i.createdByName) metaParts.push('by ' + i.createdByName);
          if (i.createdAt) metaParts.push(new Date(i.createdAt).toLocaleString());

          div.innerHTML = `
            <div class="issue-top">
              <p class="issue-title">${i.title || 'Untitled'}</p>
              <span class="muted">${i.status || 'open'}</span>
            </div>
            <div class="issue-meta">${metaParts.join(' • ')}</div>
            <div class="muted" style="margin-top:6px; white-space:pre-wrap">${i.details || ''}</div>
            <div class="muted" style="margin-top:8px">Notes: ${i.notes ? i.notes.length : 0}</div>
            <button class="secondary" data-id="${i.id}">Add note</button>`;
          issueList.appendChild(div);
        }
      }

      identityForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = (displayName.value || '').trim();
        if (!name){ alert('Display name required'); return; }
        safe(() => profileApi && profileApi.saveCurrent({ displayName: name }));
        renderIdentity();
        alert('Identity saved locally.');
      });

      issueForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const me = renderIdentity();
        if (!me){
          alert('Set your profile display name first.');
          return;
        }

        const title = (document.getElementById('title').value || '').trim();
        if (!title){ alert('Title required'); return; }

        safe(() => issuesApi && issuesApi.add({
          category: document.getElementById('category').value || '',
          title,
          location: document.getElementById('location').value || '',
          details: document.getElementById('details').value || '',
        }));

        issueForm.reset();
        renderIssues();
      });

      issueList.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn || !btn.dataset.id) return;
        const text = prompt('Add a note');
        if (!text) return;
        safe(() => issuesApi && issuesApi.addNote(btn.dataset.id, text));
        renderIssues();
      });

      renderIdentity();
      renderIssues();
    })();
  </script>

</body>
</html>
