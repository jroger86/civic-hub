<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Civic Hub — Issues</title>
  <style>
    body{margin:0;font-family:system-ui;background:#050815;color:rgba(255,255,255,.92)}
    a{color:#5addee;text-decoration:none}
    header{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:14px;border-bottom:1px solid rgba(90,221,255,.25)}
    nav{display:flex;gap:8px;flex-wrap:wrap}
    nav a{padding:8px 10px;border:1px solid rgba(255,255,255,.10);border-radius:999px;color:rgba(255,255,255,.68)}
    nav a:hover{border-color:#5addee;color:#5addee}
    .wrap{max-width:1100px;margin:0 auto;padding:14px}
    .card{border:1px solid rgba(90,221,255,.25);background:rgba(255,255,255,.04);border-radius:16px;padding:14px}
    input,textarea,select{width:100%;margin-top:10px;border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:white}
    select option{color:#070d1f;background:#fff}
    button{margin-top:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(90,221,255,.10);color:#5addee}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <strong>Civic Hub</strong>
      <nav>
        <a href="index.html">Home</a>
        <a href="issues.html">Issues</a>
        <a href="live-debate.html">Live Debate</a>
        <a href="community.html">Community</a>
        <a href="petitions.html">Petitions</a>
        <a href="emergency-guidance.html">Emergency Guidance</a>
        <a href="cin-model.html">CIN Model</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <h1>Report an Issue</h1>
      <p style="color:rgba(255,255,255,.68)">This is the community issue intake lane (demo).</p>

      <section class="card">
        <label>Category</label>
        <select>
          <option value="">Select…</option>
          <option>Safety</option>
          <option>Infrastructure</option>
          <option>Health</option>
          <option>Environment</option>
          <option>Other</option>
        </select>
        <label>Title</label>
        <input type="text" placeholder="Short title" />
        <label>Details</label>
        <textarea rows="4" placeholder="What’s happening?" ></textarea>
        <label>Location</label>
        <input type="text" placeholder="Neighborhood / address (approx)" />
        <label>Contact (optional)</label>
        <input type="text" placeholder="Email / phone" />
        <button type="button" onclick="alert('Prototype: issue submitted (local-only demo).')">Submit issue</button>
      </section>
    </main>
  </div>
</body>
</html>
